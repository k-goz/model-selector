name: Scrape SPA Pricing Pages

on:
  # 每周一北京时间 10:00 (UTC 02:00) 自动运行
  schedule:
    - cron: '0 2 * * 1'
  # 支持手动触发
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Scrape SPA pricing pages
        run: python3 fetch_spa_prices.py

      - name: Check for changes
        id: check
        run: |
          git diff --quiet spa_prices.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spa_prices.json
          git commit -m "auto: update SPA pricing data $(date +%Y-%m-%d)"
          git push
