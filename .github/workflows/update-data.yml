name: Update Model Data

on:
  # 每天北京时间 06:00 (UTC 22:00) 自动运行
  schedule:
    - cron: '0 22 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate data + ping test
        env:
          OUTPUT_FILE: index.html
          CACHE_DIR: .cache
          SF_KEY: ${{ secrets.SF_KEY }}
          ALIYUN_KEY: ${{ secrets.ALIYUN_KEY }}
          MS_KEY: ${{ secrets.MS_KEY }}
          ZH_KEY: ${{ secrets.ZH_KEY }}
          VOLC_KEY: ${{ secrets.VOLC_KEY }}
          TENCENT_KEY: ${{ secrets.TENCENT_KEY }}
          SPARK_KEY: ${{ secrets.SPARK_KEY }}
          MINIMAX_KEY: ${{ secrets.MINIMAX_KEY }}
          YI_KEY: ${{ secrets.YI_KEY }}
          BAICHUAN_KEY: ${{ secrets.BAICHUAN_KEY }}
          JIEYUE_KEY: ${{ secrets.JIEYUE_KEY }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
          BAIDU_KEY: ${{ secrets.BAIDU_KEY }}
          TOGETHER_KEY: ${{ secrets.TOGETHER_KEY }}
          FIREWORKS_KEY: ${{ secrets.FIREWORKS_KEY }}
          COHERE_KEY: ${{ secrets.COHERE_KEY }}
          INFINI_KEY: ${{ secrets.INFINI_KEY }}
          NOVITA_KEY: ${{ secrets.NOVITA_KEY }}
          DEEPINFRA_KEY: ${{ secrets.DEEPINFRA_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 generate.py

      - name: Check for changes
        id: check
        run: |
          git diff --quiet index.html models_data.json ping_analysis.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html models_data.json ping_analysis.json
          git commit -m "auto: update model data + ping $(date +%Y-%m-%d)"
          git push
