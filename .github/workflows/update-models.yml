name: Update Model Data

on:
  schedule:
    # 每天北京时间 8:00 (UTC 0:00) 运行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手动触发按钮

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # generate.py uses only stdlib, no extra deps needed
      
      - name: Run generate.py
        env:
          SF_KEY: ${{ secrets.SF_KEY }}
          ALIYUN_KEY: ${{ secrets.ALIYUN_KEY }}
          MS_KEY: ${{ secrets.MS_KEY }}
          ZH_KEY: ${{ secrets.ZH_KEY }}
          VOLC_KEY: ${{ secrets.VOLC_KEY }}
          TENCENT_KEY: ${{ secrets.TENCENT_KEY }}
          SPARK_KEY: ${{ secrets.SPARK_KEY }}
          MINIMAX_KEY: ${{ secrets.MINIMAX_KEY }}
          YI_KEY: ${{ secrets.YI_KEY }}
          BAICHUAN_KEY: ${{ secrets.BAICHUAN_KEY }}
          JIEYUE_KEY: ${{ secrets.JIEYUE_KEY }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python generate.py
          # 输出价格变动信息
          if [ -f ".cache/price_changes.json" ]; then
            echo "price_changes_detected=true" >> $GITHUB_OUTPUT
            cat .cache/price_changes.json
          fi
      
      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet index.html || echo "has_changes=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html .cache/
          git commit -m "🔄 自动更新模型价格数据 - $(date '+%Y-%m-%d %H:%M')"
          git push
      
      - name: Summary
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "✅ 数据已更新并推送到 GitHub"
          echo "🌐 Vercel 和 Cloudflare 将自动部署"
